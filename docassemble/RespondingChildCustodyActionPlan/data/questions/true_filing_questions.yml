mandatory: True
code: |
  other_party_in_case = 'other parent'

  if have_complaint:
    other_party_exempt
  last_screen
---
question: |
  Do you have a copy of the complaint?
yesno: have_complaint
---
question: |
  Is ${ other_party_in_case } exempt from using TrueFiling?
subquestion: |
  Look at the complaint.
  At the end, did ${ other_party_in_case } check the box to say they are exempt from using TrueFiling, the court’s electronic filing system? 
fields:
  - Did they check the 'exempt' box?: other_party_exempt
    input type: radio
    choices:
      - Yes: true
      - No: false
      - "I don’t have the complaint right now.": none
  - Did ${ other_party_in_case } put their email in the complaint?: other_party_enter_email
    datatype: yesnomaybe
    show if:
      variable: other_party_exempt
      is: true
---
event: last_screen
question: |
  File and serve
subquestion: |
  <div class="step-subheading">${ answer_file_and_serve_step.subject }</div>
  ${ answer_file_and_serve_step.content }
  
---
template: answer_file_and_serve_step
subject: |
  % if other_party_exempt == 'True':
  % if not other_party_enter_email:
  File and serve electronically
  % endif
  % endif
content: |
  You have 20 days after you receive the Complaint to file your documents with the court and serve ${ other_party_in_case }.
    
  After you finish your Answer, you need to send it to the court.  This is called “filing.”  You also need to give ${ other_party_in_case } a copy of everything you file with the court. This is called “service.”
  
  **Filing**
  
  1. The court has a system called TrueFiling that you need to use unless you are exempt. You are exempt if one of these applies:
  
      * You are in a jail or correctional facility.
      * You have a disability under the Americans with Disabilities Act (ADA).
      * You do not have safe access to a computer, internet, or email.
      * You cannot get the help you need to use TrueFiling.
      * You have a language barrier or are Limited English Proficient.
  

  
  2. If you are exempt and choose not to use TrueFiling, mark it on your form or fill out [TF-820 Notice of Change to Use of Email or TrueFiling](https://public.courts.alaska.gov/web/forms/docs/tf-820.pdf).  
  File the form with your other documents.
  
  3. If you are not exempt, [create an account](https://akfile.truefiling.com/register) and file your documents.
  
  4. If you are exempt and choose not to use TrueFiling, read  [If I am not using TrueFiling, how do I serve the other side?](https://courts.alaska.gov/shc/family/serve.htm)


  **Serving ${ other_party_in_case } when you are using TrueFiling**
  
  % if other_party_exempt == 'none' or (other_party_exempt == 'True' and other_party_enter_email == 'none'):
  Look at their complaint to see if they checked they were exempt.  If not, they are using TF.  Even if they checked they are exempt, look to see if they put their email anywhere on the complaint.  If they put an email, you can serve them through TrueFiling.  Read [Serving the Other Side](https://courts.alaska.gov/shc/family/serve.htm).  
  % endif

  % if other_party_exempt == 'False':
  1.	Use TrueFiling to serve ${ other_party_in_case }.  
  % elif other_party_exempt == 'True':
  % if other_party_enter_email:
  Follow the TrueFiling instructions to serve them at their email address.
  % endif
  Read [If I am using TrueFiling, how do I serve the other side?](https://courts.alaska.gov/shc/family/serve.htm)
  % endif

  % if other_party_exempt == 'True':
  % if not other_party_enter_email:

  1. Because the other person is not using TrueFiling and did not give an email address, you cannot serve them through TrueFiling.
  
  2. Wait to file your document with the court until after you fill out the certificate of service and serve ${other_party_in_case }.
  
  3. To serve ${ other_party_in_case }, send them a copy of all your documents by regular, 1st class mail, or hand-deliver it.
  
  4. Decide the date you will serve ${ other_party_in_case }. Try to serve ${ other_party_in_case } the same day you file your documents with the court.
  
  5. Fill out the Certificate of Service at the end of your court forms. The "certificate" tells the court how you are giving a copy of all the documents you file with the court to ${ other_party_in_case }.  If the form does not have a **Certificate of Service**, use **Certificate of Service,  TF-700** [Fill-in PDF](https://public.courts.alaska.gov/web/forms/docs/tf-700.pdf).
  
  6. File your documents with the court using TrueFiling.  Include a copy of the **Certificate of Service**. 
  
  7. If you do not fill out the **Certificate of Service**:

  <span style="color: pink;">**If interview is answering custody, answering divorce or responding to a motion in custody or responding to a motion in divorce - i.e. changing custody and changing divorce order interviews:**</span> 
  
    * The court will send you a **Deficiency Notice**, and
    * The judge may not get your paperwork.
  
  <span style="color: pink;">**Or in other interviews where user is filing a motion i.e. changing custody and changing divorce order interviews:**</span>
  
    *	The court may not accept your motion or may send you a **Deficiency Notice**, and
    * The judge may not see your motion or make a decision.
  
  % endif
  % endif

    


  
  
  
                                                                 
                                                                 
  
  
  
