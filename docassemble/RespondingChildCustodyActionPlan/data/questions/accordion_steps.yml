    add_unique_step((expect_after_motion_or_answer_step, "expect_after_motion_or_answer_idx"), step_list)

    if not ((type_of_response.all_true('wrong state', 'default') and not jurisdiction) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order') or (type_of_response['default'] and stage_of_default == 'judgment entered') or type_of_response.all_false()):
      add_unique_step((learn_more_about_process_step, "learn_more_about_process_idx"), step_list)
  
  ### Double check this condition test @143 gives value, this condition should ask for it I think.
  if type_of_response['ak custody case'] and not(type_of_response['default'] and stage_of_default == 'judgment entered') and (not(type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order')):
    if domestic_violence:
      add_unique_step((answer_domestic_violence_step, "answer_domestic_violence_idx"), step_list)
    #### if (wrong state or case in 2 states) and not served properly - do not ask paternity
    if type_of_response.all_true('ak custody case', exclusive = True) or (type_of_response['ak custody case'] and (type_of_response.any_true('wrong state', 'case in 2 states') and type_of_response.all_false('improper service'))) or (type_of_response['ak custody case'] and (type_of_response['default'] and stage_of_default in('application filed', 'hearing scheduled'))):
      if paternity:
        add_unique_step((paternity_step, "paternity_idx"), step_list)


  if type_of_response.all_false():
    want_help_to_agree = True
    default_info = False
    add_unique_step((want_help_to_agree_step, "want_help_to_agree_idx"), step_list)  
    # add_unique_step((parent_agreements_step, "parent_agreements_idx"), step_list)
    if agreement_documents:
      add_unique_step((uncontested_custody_forms_step, "uncontested_custody_forms_idx"), step_list)
      if filling_manner in('paper', 'dunno') or filing_method in('mail or in person', 'dunno'):
        add_unique_step((sign_step, "sign_idx"), step_list)
      add_unique_step((truefiling_file_and_serve_step, "truefiling_file_and_serve_idx"), step_list)
      add_unique_step((read_standing_order_step, "read_standing_order_idx"), step_list)
      add_unique_step((expect_after_motion_or_answer_step, "expect_after_motion_or_answer_idx"), step_list)
    if domestic_violence:
      add_unique_step((answer_domestic_violence_step, "answer_domestic_violence_idx"), step_list)
  
  
  add_unique_step((get_help, "get_help_idx"), step_list)

  #  log("STEP LIST IDS: " + repr([step_tuple[1] for step_tuple in step_list]))
  #  log("filling_manner: " + repr(filling_manner))
  #  log("filing_method: " + repr(filing_method))
   
  for iter_idx, step_tuple in enumerate( step_list ):
    define(step_tuple[ 1 ], iter_idx + 1)
  get_steps = True
