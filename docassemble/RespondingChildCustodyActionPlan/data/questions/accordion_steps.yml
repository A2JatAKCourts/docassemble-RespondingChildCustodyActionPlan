comment: |
    last updated: 2026-04-29 deleted all templates from this file. Now using only branding package for steps or templates in this file.
    2025-06-04 until we get the docassemble interview Learn about motions: <a href="https://courtguide.akcourts.gov/start/FilingAMotion">Asking for an Order in a Divorce Case When the Issue Can't Wait for the Court's Final Decision (Filing a Motion) GA</a> live, use the link to the court webpage in the list under "Read." See Github branding issue https://github.com/A2JatAKCourts/docassemble-AKA2JBrandingIssues/issues/64
---
generic object: ALDocumentBundle
template: x.get_email_copy
content: |
  Email a copy of your Action Plan to yourself or someone else
---
generic object: ALDocumentBundle
template: x.send_email_template
subject: |
  % if type_of_response.any_true():
  Your Action Plan for responding in your child custody case in ${ len(step_list) } steps
  % else:
  Your Action Plan for responding when the other parent has not started a custody case yet, but wants to see if you can agree on a Parenting Plan and custody order
  % endif
content: |
  Thank you for using the Alaska Court System's Court Guide Action Plan.

  Your Action Plan is attached.

  Get [more information and a list of all the Court Guide Action Plans](https://ak-courts.info/ActionPlan).  
  
  [ak-courts.info/ActionPlan](https://ak-courts.info/ActionPlan).
---
id: final screen
decoration: pen-to-square
event: confirmation_and_download
question: |
  % if len(step_list) < 2:
  Get more information or help
  % else:
  # <i class="fa-thin fa-list"></i>Your Action Plan is ready!
  % endif
subquestion: |
  % if type_of_response.any_true():
  #### Your Action Plan for responding in your child custody case in ${ len(step_list) } steps
  % else:
  #### Your Action Plan for responding when the other parent has not started a custody case yet, but wants to see if you can agree on a Parenting Plan and custody order
  % endif
  % if get_config("debug", False):
  <button id="akc_expand_all" class="btn other stuff">Expand all</button>
  <button id="akc_collapse_all" class="btn other stuff">Collapse all</button>
  % endif  
  
  % for iteration_index, step_tuple in enumerate( step_list ):
  ${ collapse_template(step_tuple[0], closed_icon="plus", open_icon="minus") }
  % endfor
  
  ${ al_user_bundle.download_list_html() }
  
  &nbsp;

  ${ al_user_bundle.send_button_html(show_editable_checkbox=False) }
  
  % if get_config("debug", False):
  [get the docx file](${ docx_responding_child_custody_action_plan_attachment.docx.url_for() })
  % endif 
   
buttons:
  - Start over: restart
script: |
  <script>
  let expander = $("#akc_expand_all")
  expander.on("click", function () {
   Array.from(document.querySelectorAll('.al_collapse_template .collapse')).forEach((elem) => { elem.className += " show" })
  })
  
  let collapser = $("#akc_collapse_all")
  collapser.on("click", function () {
      Array.from(document.querySelectorAll('.al_collapse_template .collapse')).forEach((elem) => { elem.className = elem.className.replace(" show", "" ) })
  })
  </script>
---
