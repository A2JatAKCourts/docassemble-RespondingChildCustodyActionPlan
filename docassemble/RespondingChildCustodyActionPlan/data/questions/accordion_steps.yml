comment: |
    last updated: 2026-04-29 deleted all templates from this file. Now using only branding package for steps or templates in this file.
    2025-06-04 until we get the docassemble interview Learn about motions: <a href="https://courtguide.akcourts.gov/start/FilingAMotion">Asking for an Order in a Divorce Case When the Issue Can't Wait for the Court's Final Decision (Filing a Motion) GA</a> live, use the link to the court webpage in the list under "Read." See Github branding issue https://github.com/A2JatAKCourts/docassemble-AKA2JBrandingIssues/issues/64
---
generic object: ALDocumentBundle
template: x.get_email_copy
content: |
  Email a copy of your Action Plan to yourself or someone else
---
generic object: ALDocumentBundle
template: x.send_email_template
subject: |
  % if type_of_response.any_true():
  Your Action Plan for responding in your child custody case in ${ len(step_list) } steps
  % else:
  Your Action Plan for responding when the other parent has not started a custody case yet, but wants to see if you can agree on a Parenting Plan and custody order
  % endif
content: |
  Thank you for using the Alaska Court System's Court Guide Action Plan.

  Your Action Plan is attached.

  Get [more information and a list of all the Court Guide Action Plans](https://ak-courts.info/ActionPlan).  
  
  [ak-courts.info/ActionPlan](https://ak-courts.info/ActionPlan).
---
id: final screen
decoration: pen-to-square
event: confirmation_and_download
question: |
  % if len(step_list) < 2:
  Get more information or help
  % else:
  # <i class="fa-thin fa-list"></i>Your Action Plan is ready!
  % endif
subquestion: |
  % if type_of_response.any_true():
  #### Your Action Plan for responding in your child custody case in ${ len(step_list) } steps
  % else:
  #### Your Action Plan for responding when the other parent has not started a custody case yet, but wants to see if you can agree on a Parenting Plan and custody order
  % endif
  % if get_config("debug", False):
  <button id="akc_expand_all" class="btn other stuff">Expand all</button>
  <button id="akc_collapse_all" class="btn other stuff">Collapse all</button>
  % endif  
  
  % for iteration_index, step_tuple in enumerate( step_list ):
  ${ collapse_template(step_tuple[0], closed_icon="plus", open_icon="minus") }
  % endfor
  
  ${ al_user_bundle.download_list_html() }
  
  &nbsp;

  ${ al_user_bundle.send_button_html(show_editable_checkbox=False) }
  
  % if get_config("debug", False):
  [get the docx file](${ docx_responding_child_custody_action_plan_attachment.docx.url_for() })
  % endif 
   
buttons:
  - Start over: restart
script: |
  <script>
  let expander = $("#akc_expand_all")
  expander.on("click", function () {
   Array.from(document.querySelectorAll('.al_collapse_template .collapse')).forEach((elem) => { elem.className += " show" })
  })
  
  let collapser = $("#akc_collapse_all")
  collapser.on("click", function () {
      Array.from(document.querySelectorAll('.al_collapse_template .collapse')).forEach((elem) => { elem.className = elem.className.replace(" show", "" ) })
  })
  </script>
---
code: |
  step_list = []
  if len(step_list) >= 2:
    pdf_pap_multistep_subtitle = True
  images_list = []
  distribution_certificate_list = []
  reply_certificate_list = []
  other_party_in_case  = 'the other parent'
  case_type = 'custody'  
  type_of_response['ak divorce case'] = False  
  type_of_response['stay married'] = False
  distribution_certificate_list.append({'image': distrib_cert_custody_divorce_image, 'text': "Certificate of Distribution shows the date the court sent your order to you."})
  # expect_after_motion is in what to expect step for filing motion for interim order w complaint, or answer/response, cannot use variable in docx template, must insert condition in what to expect step.
  expect_after_motion = ''
  file_motion_to_set_aside = ''
  file_motion_to_enforce = ''
  file_modify_filing_fee = ''
  reply_certificate_list.append({'image': service_cert_reply_image, 'text': "Certificate of Service at the bottom of the Reply form."})
  # motion_type used in expect_after_motion_step "What to expect after you file a ${ motion_type }"
  motion_type = 'motion or Answer'

  
  # if len(type_of_response.true_values()) > 1:
  #   add_unique_step((pick_a_step_step, "pick_a_step_idx"), step_list)
  #### Question order #####
  
  if type_of_response['case in 2 states']:
    if stage_of_other_case == 'ended with order':
      ask_paternity = False
  if type_of_response['default']:
    if stage_of_default == 'judgment entered':
      ask_paternity = False 
  
  if type_of_response.all_true('improper service', exclusive = True):
    proper_service = False
    add_unique_step((proper_service_step, "proper_service_idx"), step_list)
    add_unique_step((decide_after_improper_service_step, "decide_after_improper_service_idx"), step_list)
    add_unique_step((answer_step, "answer_idx"), step_list)
         
  if type_of_response['wrong state']:
    jurisdiction
    add_unique_step((answer_jurisdiction_step, "answer_jurisdiction_idx"), step_list)
    if type_of_response.any_true('improper service', 'default'):
      proper_service
      if type_of_response['default']:
        military
      add_unique_step((proper_service_step, "proper_service_idx"), step_list)
    if type_of_response['improper service'] and jurisdiction and not proper_service:
      add_unique_step((decide_after_improper_service_step, "decide_after_improper_service_idx"), step_list)
    if not type_of_response['default']:
      add_unique_step((answer_step, "answer_idx"), step_list)  
      if not jurisdiction:
        add_unique_step((dismiss_step, "dismiss_idx"), step_list) 
    if type_of_response['default'] and stage_of_default in('application filed', 'hearing scheduled'):
      if jurisdiction:
        add_unique_step((default_options_step, "default_options_idx"), step_list)
        add_unique_step((answer_step, "answer_idx"), step_list)  
      else:
        add_unique_step((dismiss_step, "dismiss_idx"), step_list)
    if type_of_response['default'] and stage_of_default == 'judgment entered':
      if jurisdiction:
        add_unique_step((default_options_step, "default_options_idx"), step_list)
      add_unique_step((learn_set_aside_step, "learn_set_aside_idx"), step_list)
      add_unique_step((fill_set_aside_step, "fill_set_aside_idx"), step_list)


  if type_of_response['case in 2 states']:
    if stage_of_other_case == 'still going':
      jurisdiction 
    if stage_of_other_case in('still going', 'ended with no order') and not(type_of_response['default'] and stage_of_default == 'judgment entered'):
      add_unique_step((answer_jurisdiction_step, "answer_jurisdiction_idx"), step_list)
    if type_of_response['improper service'] or type_of_response['default']:
      proper_service
      if type_of_response['default']:
        military
      add_unique_step((proper_service_step, "proper_service_idx"), step_list)
    if stage_of_other_case == 'ended with no order'and type_of_response['improper service'] and not proper_service:
        add_unique_step((decide_after_improper_service_step, "decide_after_improper_service_idx"), step_list)
    if stage_of_other_case == 'still going' and not (type_of_response['default'] and stage_of_default == 'judgment entered'):
      add_unique_step((case_in_2_states_step, "case_in_2_states_idx"), step_list)
    if type_of_response['default'] and (stage_of_other_case == 'ended with no order' or (stage_of_other_case == 'ended with order' and stage_of_default == 'judgment entered')):
      add_unique_step((default_options_step, "default_options_idx"), step_list)
    if type_of_response['default'] and stage_of_default == 'judgment entered':
      add_unique_step((learn_set_aside_step, "learn_set_aside_idx"), step_list)
      add_unique_step((fill_set_aside_step, "fill_set_aside_idx"), step_list)
    if stage_of_other_case in('still going', 'ended with no order') and not (type_of_response['default'] and stage_of_default == 'judgment entered'):
      add_unique_step((answer_step, "answer_idx"), step_list)
    if (stage_of_other_case in('still going', 'ended with order') and (not (type_of_response['default'] and stage_of_default == 'judgment entered')) or (type_of_response['default'] and not proper_service and stage_of_default in('application filed', 'hearing scheduled'))):
      add_unique_step((dismiss_step, "dismiss_idx"), step_list)  
  
  if type_of_response.all_true('default', exclusive = True):
    proper_service
    military
    add_unique_step((proper_service_step, "proper_service_idx"), step_list)
    add_unique_step((default_options_step, "default_options_idx"), step_list)
    if stage_of_default in('application filed','hearing scheduled'):
      add_unique_step((answer_step, "answer_idx"), step_list)
      if not proper_service:
        add_unique_step((dismiss_step, "dismiss_idx"), step_list)
    if stage_of_default == 'judgment entered':
      add_unique_step((learn_set_aside_step, "learn_set_aside_idx"), step_list)
      add_unique_step((fill_set_aside_step, "fill_set_aside_idx"), step_list)
    
  
  if type_of_response.all_true('ak custody case', exclusive = True):
    proper_service = True
    if (response_to_complaint in('agree', 'some') or (response_to_complaint == 'none' and want_help_to_agree)):
      add_unique_step((want_help_to_agree_step, "want_help_to_agree_idx"), step_list)
    add_unique_step((answer_step, "answer_idx"), step_list)

  if type_of_response.all_true('ak custody case', 'improper service', exclusive = True):
    proper_service
    add_unique_step((proper_service_step, "proper_service_idx"), step_list)
    if not proper_service :
      add_unique_step((decide_after_improper_service_step, "decide_after_improper_service_idx"), step_list)
    add_unique_step((answer_step, "answer_idx"), step_list)

  if type_of_response.any_true():
    if filling_manner in('paper', 'dunno') or filing_method in('mail or in person', 'dunno'):
      add_unique_step((sign_step, "sign_idx"), step_list)
    if type_of_response.any_true('improper service', 'default') and not proper_service: 
      if have_complaint:
        other_party_exempt
    else:
      other_party_exempt
    add_unique_step((truefiling_file_and_serve_step, "truefiling_file_and_serve_idx"), step_list)
    add_unique_step((truefiling_serve_step, "truefiling_serve_idx"), step_list)

    if not ((type_of_response['default'] and stage_of_default == 'judgment entered') or (type_of_response.all_true('wrong state', 'default') and not jurisdiction) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order')):
      add_unique_step((read_standing_order_step, "read_standing_order_idx"), step_list)
  
    add_unique_step((expect_after_motion_or_answer_step, "expect_after_motion_or_answer_idx"), step_list)

    if not ((type_of_response.all_true('wrong state', 'default') and not jurisdiction) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order') or (type_of_response['default'] and stage_of_default == 'judgment entered') or type_of_response.all_false()):
      add_unique_step((learn_more_about_process_step, "learn_more_about_process_idx"), step_list)
  
  ### Double check this condition test @143 gives value, this condition should ask for it I think.
  if type_of_response['ak custody case'] and not(type_of_response['default'] and stage_of_default == 'judgment entered') and (not(type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order')):
    if domestic_violence:
      add_unique_step((answer_domestic_violence_step, "answer_domestic_violence_idx"), step_list)
    #### if (wrong state or case in 2 states) and not served properly - do not ask paternity
    if type_of_response.all_true('ak custody case', exclusive = True) or (type_of_response['ak custody case'] and (type_of_response.any_true('wrong state', 'case in 2 states') and type_of_response.all_false('improper service'))) or (type_of_response['ak custody case'] and (type_of_response['default'] and stage_of_default in('application filed', 'hearing scheduled'))):
      if paternity:
        add_unique_step((paternity_step, "paternity_idx"), step_list)


  if type_of_response.all_false():
    want_help_to_agree = True
    default_info = False
    add_unique_step((want_help_to_agree_step, "want_help_to_agree_idx"), step_list)  
    # add_unique_step((parent_agreements_step, "parent_agreements_idx"), step_list)
    if agreement_documents:
      add_unique_step((uncontested_custody_forms_step, "uncontested_custody_forms_idx"), step_list)
      if filling_manner in('paper', 'dunno') or filing_method in('mail or in person', 'dunno'):
        add_unique_step((sign_step, "sign_idx"), step_list)
      add_unique_step((truefiling_file_and_serve_step, "truefiling_file_and_serve_idx"), step_list)
      add_unique_step((read_standing_order_step, "read_standing_order_idx"), step_list)
      add_unique_step((expect_after_motion_or_answer_step, "expect_after_motion_or_answer_idx"), step_list)
    if domestic_violence:
      add_unique_step((answer_domestic_violence_step, "answer_domestic_violence_idx"), step_list)
  
  
  add_unique_step((get_help, "get_help_idx"), step_list)

  #  log("STEP LIST IDS: " + repr([step_tuple[1] for step_tuple in step_list]))
  #  log("filling_manner: " + repr(filling_manner))
  #  log("filing_method: " + repr(filing_method))
   
  for iter_idx, step_tuple in enumerate( step_list ):
    define(step_tuple[ 1 ], iter_idx + 1)
  get_steps = True
