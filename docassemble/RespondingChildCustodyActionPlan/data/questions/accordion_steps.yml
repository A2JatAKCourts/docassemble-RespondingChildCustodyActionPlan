      if jurisdiction:
        add_unique_step((default_options_step, "default_options_idx"), step_list)
        add_unique_step((answer_step, "answer_idx"), step_list)  
      else:
        add_unique_step((dismiss_step, "dismiss_idx"), step_list)
    if type_of_response['default'] and stage_of_default == 'judgment entered':
      if jurisdiction:
        add_unique_step((default_options_step, "default_options_idx"), step_list)
