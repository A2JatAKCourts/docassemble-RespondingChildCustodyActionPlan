template: answer_step
subject: |
  Step ${ answer_idx }:
  % if type_of_response['wrong state'] and type_of_response.all_false('default') and ((user_need == 'answer custody' and not jurisdiction) or user_need == 'answer divorce'): 
  Fill out the forms to respond
  % if not(type_of_response.any_true('improper service', 'default') and not proper_service):
  in 20 days
  % endif
  and ask to dismiss if you think Alaska is the wrong state
  % else:
  % if type_of_response.all_true('improper service', exclusive = True) \
    or (type_of_response['improper service'] and not proper_service and \
    ((type_of_response['wrong state'] and ((user_need == 'answer custody' and jurisdiction) or user_need == 'answer divorce')) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order'))) \
      or (type_of_response['default'] and stage_of_default in ('application filed', 'hearing scheduled') and ((type_of_response['wrong state'] and ((user_need == 'answer custody' and jurisdiction) or user_need == 'answer divorce')) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order'))) \
      or (type_of_response.all_true('default', exclusive = True) and stage_of_default in('application filed', 'hearing scheduled')):
  If you decide to move forward, fill
  % elif type_of_response['case in 2 states'] and stage_of_other_case == 'still going' and ((type_of_response['default'] and stage_of_default in('application filed', 'hearing scheduled')) or type_of_response.all_false('default')):
  If you decide to move forward in Alaska, fill 
  % else:
  Fill
  % endif
  out the forms to answer the complaint
  % if type_of_response.all_true('improper service', exclusive = True) or (not (type_of_response.any_true('improper service', 'default') and not proper_service)):
  and respond within 20 days
  % endif
  % endif
content: |
  % if not(type_of_response.any_true('improper service', 'default') and not proper_service):
  You have **20 days** from the date you get the complaint to:
  % endif 

  1.	File an **Answer** and other required forms with the court to tell the judge what you want to happen in your case.
  2.	Give a copy of the forms to ${ other_party_in_case }. See ${ truefiling_serve_step.subject }.

    ${ signing_paragraph }
  
  % if type_of_response['wrong state'] and (user_need == 'answer custody' and not jurisdiction):
  If you think Alaska is not the "home state," you can ask the court to dismiss your case:
  
    * Fill out your **Answer** and tell the Alaska court why you think the case should be in another state.
    * Fill out the **Motion to Dismiss** forms that ask the court to dismiss your case. 
  % if type_of_response['default']:
  Read ${ dismiss_step.subject }.
  % endif
    * File the motion forms with your **Answer**.
  % endif
 
  <div class="step-subheading">Use</div>
  % if user_need == 'answer custody':
   **ANSWER AND COUNTERCLAIM TO COMPLAINT FOR CUSTODY OF MINOR CHILDREN, DR-450** [[Fill-In PDF](https://ak-courts.info/dr450)]
  % endif
  % if user_need == 'answer divorce':
  % if minor_children or (not minor_children and wife_is_pregnant in('husband', 'not husband')):
  % if case_type == 'divorce':
     **ANSWER AND COUNTERCLAIM TO COMPLAINT FOR DIVORCE WITH CHILDREN, DR-832** [[Fill-In PDF](https://ak-courts.info/dr832)]
  % elif case_type == 'legal separation':
    **Answer & Counterclaim to Legal Separation With Children, SHC-094** [Word](https://courts.alaska.gov/shc/family/docs/shc-094.doc) | [PDF](https://courts.alaska.gov/shc/family/docs/shc-094n.pdf)
  % endif
  % if not minor_children and wife_is_pregnant in('husband', 'not husband'):
    You must use this form because wife is pregnant.
  % endif
  % elif not minor_children and wife_is_pregnant == 'not pregnant':
  % if case_type == 'divorce':
  **ANSWER AND COUNTERCLAIM TO COMPLAINT FOR DIVORCE WITHOUT CHILDREN, DR-837** [[Fill-In PDF](https://ak-courts.info/dr837)]
  % elif case_type == 'legal separation':
  **Answer & Counterclaim to Legal Separation Without Children, SHC-095** [Word](https://courts.alaska.gov/shc/family/docs/shc-095.doc) | [PDF](https://courts.alaska.gov/shc/family/docs/shc-095n.pdf)
  % endif
  % endif
  % endif
  
  1. At the top of the **Answer & Counterclaim** form, put your name, mailing address, contact phone number, and email address.
  
  2. Fill out the rest of the top section **exactly** as it is filled out on ${ other_party_in_case }'s complaint:
  
      * the location of the court,
      * ${ other_party_in_case }'s name goes on the line for the plaintiff's name,
      * your name goes on the line for the defendant's name, and
      * the case number from the complaint.
      This section of the form is called the 'Caption.'
  
  **A. Answer section**<br>
  Look at each paragraph in ${ other_party_in_case }'s complaint and decide if you agree, disagree, or you are not sure.

  % if (user_need == 'answer custody' and (type_of_response.all_true('ak custody case', exclusive = True) or type_of_response.all_true('ak custody case', 'improper service', exclusive = True))) or (user_need == 'answer divorce' and (type_of_response.all_true('ak divorce case', exclusive = True) or type_of_response.all_true('ak divorce case', 'improper service', exclusive = True))):
  % if (case_type == 'custody' or case_type == 'divorce' or (case_type == 'legal separation' and want_legal_separation == 'yes')) and response_to_complaint == 'agree':
    * If you agree with what ${ other_party_in_case } asked for in their complaint, check the box in this section that says you "agree with all of the statements in the complaint."
  % elif (case_type == 'custody' or case_type == 'divorce' or (case_type == 'legal separation' and want_legal_separation == 'yes')) and response_to_complaint == 'some':
    * If you disagree with any of the paragraphs in the complaint, list the paragraph numbers you disagree with.
  % else:
    * Check the appropriate box in your Answer.
      * If you disagree with any of the paragraphs in the complaint, list the paragraph numbers you disagree with.
      * If you are not sure if you agree or disagree with any of the paragraphs in the complaint, list the paragraph numbers you are not sure about.
  % endif
  % endif

  
  **B. Affirmative Defenses**<br>
  An affirmative defense is the facts and arguments that attack the plaintiff's legal right to bring the court case. The affirmative defense can mean you win your case even if everything in the plaintiff's complaint is true.
  
    If you are unsure if an affirmative defense applies to you, [talking to a lawyer](https://ak-courts.info/findlawyer) can help because this is a complicated and important area.

  % if type_of_response['wrong state']:

  % if user_need == 'answer custody' or (user_need == 'answer divorce' and minor_children) or (user_need == 'answer divorce' and not minor_children and wife_is_pregnant in('husband', 'not husband')):
  If you think Alaska is not the "home state," you can ask the court to dismiss your case:
  % endif 
  
    * Check the box, "I state the following affirmative defense(s)."
  % if user_need == 'answer custody' or (user_need == 'answer divorce' and minor_children) or (user_need == 'answer divorce' and not minor_children and wife_is_pregnant in('husband', 'not husband')):
    * Check the boxes that explain why you think Alaska is the wrong state to decide custody of your children.  
  % endif 
  % if user_need == 'answer divorce': 
   * Check the box that explains why you think Alaska is the wrong state to decide your ${ case_type } case.
    * Check the ${ 'boxes that say' if minor_children else ''}${ 'boxes that say' if not minor_children and wife_is_pregnant in ('husband', 'not husband') else ''}${ 'box that says' if not minor_children and wife_is_pregnant == 'not pregnant' else ''}
  % else:
    * Check the box that says 
  % endif 
  you attached a Motion to Dismiss.
  % endif # wrong state
 

  % if type_of_response['case in 2 states'] and stage_of_other_case == 'still going':
    If you want your case in the other state, you can tell the Alaska court by stating it in your **Answer** and filing a **Motion to Dismiss** your Alaska case.

  * Check the box, "I state the following affirmative defense(s)."  
  * Check the "other" box and tell the Alaska court:
    * There is another case,
    * the court location, and
    * the case number.
  % endif
  
  % if type_of_response.any_true('improper service', 'default') and not proper_service:
    * You can add here that you were not served correctly.
  % else:
  % if type_of_response.all_false('wrong state', 'case in 2 states'):
  If you have no affirmative defenses:
  
    * Check the box at the beginning of the section that states, "I have no affirmative defenses." 
    * Go to the Counterclaims section.
  % endif
  % endif
  
  **C. Counterclaims**<br>
  Use this section, to tell the court your version of the facts and what you want to happen in your case.

  % if type_of_response['wrong state']:  
  % if user_need == 'answer custody' and not jurisdiction:
  Check the boxes:
  
    * "I have stated above that the case should be dismissed because Alaska does not have jurisdiction over the child(ren). And
    * "I state the following counterclaim(s).
  % endif
  % if user_need == 'answer divorce':
  Check the box:
  % if case_type == 'divorce' :
  I make the counterclaims below. If I asked the court to dismiss the case in section B (Affirmative Defenses), and the court does not dismiss the case, I do not waive my claim about the court’s lack of jurisdiction.
  % elif case_type == 'legal separation':
  I have stated above that the case should be dismissed because the Alaska court does
  not have jurisdiction over the marital estate${ ' and/or child custody' if minor_children else '' }${ ' and/or child custody' if not minor_children and wife_is_pregnant in('husband', 'not husband') else '' }.
  % endif # divorce case_type
  % endif # user_need
  % endif # wrong state
---
comment: |
  2026-04-28 - fix step heading so it aligns in docx
template: default_options_step
subject: |
  Step ${ default_options_idx }: Options 
  % if stage_of_default in('application filed', 'hearing scheduled'):
  if ${ other_party_in_case } asked for a default judgment
  % if type_of_response['case in 2 states'] and stage_of_other_case == 'still going':
  when you have case in 2 states
  % endif
  % if not proper_service:
  and did not properly serve you
  % endif
  % else: 
  when the judge entered a default judgment
  % endif
content: | 
  % if type_of_response['default'] and stage_of_default == 'judgment entered':
  % if not proper_service:
    If ${ other_party_in_case } asked for a default judgment, it means they told the court they served you correctly. You can (1) tell the judge you were not served the correct way and ask to set aside the default judgment or (2) do nothing.
  % else:
    You can (1) ask the judge to set aside the default judgment or (2) do nothing.
  % endif

  <div class="step-subheading">Option 1. Ask to Set Aside the Default Judgment</div>

  % if type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order':
  It can be complicated to have ${ "custody" if user_need == 'answer custody' else "court" } orders from 2 different state courts. You may want to ${ "tell the judge you were not served properly and and ask" if not proper_service else "ask the judge" } to set aside the default judgment.
  % else: # not (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order') but still (type_of_response['default'] and stage_of_default == 'judgment entered')
  % if not proper_service:
  If you were not served the correct way, you can tell the judge and ask the judge to set aside the judgment.
  % endif
  If you ${ "decide" if proper_service else "want" } to ask the judge to set aside the default judgment, fill out and file the paperwork as soon as you can.
  % endif
  % if type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order':
  Fill out and file the paperwork as soon as you can.
  % endif
  The longer you wait, the harder it is to set the judgment aside.
  Read about asking the judge to set aside the default judgment in steps ${learn_set_aside_idx} and ${fill_set_aside_idx}.
  <div class="step-subheading">Option 2. Do nothing</div>

  % if not (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order'):
  If you are okay with the judge's orders you do not need to do anything. 
  % endif
  Be sure you know exactly what the judge ordered. Read about [getting copies of your court file](https://ak-courts.info/recordsrequest) on the court’s website. 
  % if type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order':
  If the Alaska order is different from the ${ "custody" if user_need == 'answer custody' else "court" } order in the other state, it can be very complicated. It may be best to tell the judge about the other order and try to set aside the Alaska order. 
  % endif # type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order'
  
  You should decide quickly. The longer you wait, the harder it is to set aside the court's order.

  % if type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order':
  You may want to [talk to a lawyer](https://ak-courts.info/findlawyer). 
  % else:
  % if user_need == 'answer custody' or (user_need == 'answer divorce' and minor_children):
  If something changes substantially, and you want to ask to change the judge's custody, Parenting Plan, or child support order, read [Modifying Child Custody or Child Support Order](https://ak-courts.info/mtm) on the court's website.
  % endif
  % endif
  % elif type_of_response['default'] and stage_of_default in('application filed', 'hearing scheduled'):
  % if not proper_service:
    If ${ other_party_in_case } asked for a default judgment, it means they told the court they served you correctly. The judge may decide without hearing from you if you do not respond.
  % else:
    If ${ other_party_in_case } asked for a default judgment, the judge may decide without hearing from you if you do not respond.
  % endif
  You can (1) move forward with the case, or 
  % if not proper_service:
    (2) tell the judge you were not served the correct way and ask to dismiss the case, or (3)
  % else:
    (2) 
  % endif
  do nothing
  <div class="step-subheading">Option 1. Move forward with the case</div> 
  % if not proper_service:
    Even if you were not properly served, you
  % else:
    You
  % endif
  can file an Answer if:
  
  % if type_of_response['wrong state']:
    *	You want to tell the Alaska court it does not have jurisdiction. Or
  % endif
    * You agree with ${ other_party_in_case } that there should be a case to 
  % if user_need == 'answer custody':
  get a custody, Parenting Plan and child support order. Or
  % elif user_need == 'answer divorce':
  end your marriage${ ' and get a custody, Parenting Plan, and child support order.' if minor_children or wife_is_pregnant in('husband', 'not husband') else '.' } Or
  % endif
    * You do not want to risk a default judgment.

  If you do not have a copy of the filed documents, you can ask ${ other_party_in_case } or get a copy from your file at the courthouse. Read about [getting copies of your court file](https://ak-courts.info/recordsrequest) on the court's website.
  % if not proper_service:
    <div class="step-subheading">Option 2. Tell the judge you were not served the correct way and ask to dismiss the case</div>
    If you think you were not served the correct way and you want the court to dismiss the case, you can fill out and file a **Motion to Dismiss** that tells the court why you think you were not served properly. 
  % if user_need == 'answer divorce' or (user_need == 'answer custody' and not jurisdiction):
  See ${ dismiss_step.subject }.
  % endif 
  
    <div class="step-subheading">Option 3. Do nothing</div>
  % else:
    <div class="step-subheading">Option 2. Do nothing</div>
  % endif
  If you are okay with the judge deciding the case based on ${ other_party_in_case }'s Complaint, without hearing from you, you do not need to do anything.

  But once the judge decides, it is much harder to undo it.

  If you file an Answer, the judge will consider what you want, and there may be resources for you and ${ other_party_in_case } to work out any disagreements through mediation or a settlement conference.
  % endif